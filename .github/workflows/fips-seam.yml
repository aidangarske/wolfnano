name: fips-seam

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  fipsproof:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/setup
      - name: make fipsproof (skips cleanly without a FIPS bundle)
        run: make fipsproof WOLFNANO_FIPS_DIR="${WOLFNANO_FIPS_DIR:-/nonexistent}"
