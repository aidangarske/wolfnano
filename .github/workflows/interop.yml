name: interop

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  interop:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/setup
        with:
          peers: "true"
      - name: build wolfSSL example server
        run: |
          set -eux
          git clone --depth 1 https://github.com/wolfSSL/wolfssl "$RUNNER_TEMP/wolfssl-full"
          cd "$RUNNER_TEMP/wolfssl-full"
          ./autogen.sh
          ./configure --enable-tls13 --enable-psk --enable-curve25519 --enable-ed25519
          make -j"$(nproc)" examples/server/server
      - name: build wolfSSL PQC server (separate, --enable-mlkem)
        run: |
          set -eux
          git clone --depth 1 https://github.com/wolfSSL/wolfssl "$RUNNER_TEMP/wolfssl-pqc"
          cd "$RUNNER_TEMP/wolfssl-pqc"
          ./autogen.sh
          ./configure --enable-tls13 --enable-psk --enable-curve25519 \
            --enable-mlkem --enable-experimental
          make -j"$(nproc)" examples/server/server
      - name: build mbedTLS ssl_server2 (best-effort)
        run: |
          set -eux
          git clone --depth 1 --branch mbedtls-3.6.2 \
            https://github.com/Mbed-TLS/mbedtls "$RUNNER_TEMP/mbedtls" || exit 0
          cmake -S "$RUNNER_TEMP/mbedtls" -B "$RUNNER_TEMP/mbedtls/b" \
            -DENABLE_TESTING=Off >/dev/null 2>&1 || exit 0
          make -C "$RUNNER_TEMP/mbedtls/b" -j"$(nproc)" ssl_server2 >/dev/null 2>&1 || exit 0
      - name: make interop (vs OpenSSL + wolfSSL + mbedTLS)
        run: |
          export WOLFSSL_SERVER="$RUNNER_TEMP/wolfssl-full/examples/server/server"
          export WOLFSSL_PQC_SERVER="$RUNNER_TEMP/wolfssl-pqc/examples/server/server"
          MB="$RUNNER_TEMP/mbedtls/b/programs/ssl/ssl_server2"
          [ -x "$MB" ] && export MBEDTLS_SERVER="$MB"
          make interop
