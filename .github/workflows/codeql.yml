name: codeql

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: github/codeql-action/init@v3
        with:
          languages: c-cpp
      - uses: ./.github/actions/setup
      - run: make test
      - uses: github/codeql-action/analyze@v3
        with:
          upload: never
          output: codeql-results
      - uses: actions/upload-artifact@v4
        with:
          name: codeql-sarif
          path: codeql-results
