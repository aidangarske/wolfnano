name: arch-build

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  host-asm:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/setup
      - name: bench none vs intel (build + run)
        run: make bench

  cross:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/setup
        with:
          arm: "true"
      - name: cross-compile floor for every non-host arch
        run: make targets
