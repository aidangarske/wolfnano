name: fuzz

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/setup
      - name: fuzz the ServerHello parser
        run: make fuzz FUZZ_TIME=${{ github.event_name == 'schedule' && 600 || 60 }}
