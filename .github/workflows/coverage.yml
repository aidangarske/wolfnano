name: coverage

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/setup
      - run: sudo apt-get install -y lcov
      - name: make test with coverage
        run: make test EXTRA_CFLAGS="--coverage -O0"
      - name: capture src/ line coverage
        run: |
          lcov --capture --directory . --output-file cov.info \
            --rc lcov_branch_coverage=0 2>/dev/null || true
          lcov --remove cov.info '*/wolfssl/*' '/usr/*' '*/tests/*' \
            --output-file cov.info 2>/dev/null || true
      - name: enforce 100% on completed files (ci/coverage-100.txt)
        run: sh scripts/check_coverage.sh cov.info ci/coverage-100.txt
      - name: report table to summary
        if: always()
        run: |
          { echo '## Coverage (src/)'; echo '```';
            sh scripts/check_coverage.sh cov.info ci/coverage-100.txt || true;
            echo '```'; } >> "$GITHUB_STEP_SUMMARY"
