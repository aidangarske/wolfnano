name: sanitizer

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  asan-ubsan:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      ASAN_OPTIONS: detect_leaks=0
      UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/setup
      - name: make test under ASan + UBSan
        run: make test EXTRA_CFLAGS="-O1 -g -fsanitize=address,undefined -fno-sanitize-recover=all"
