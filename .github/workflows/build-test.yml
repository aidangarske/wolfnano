name: build-test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    label: linux-x86_64 }
          - { os: ubuntu-24.04-arm, label: linux-arm64 }
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - if: runner.os == 'Linux'
        uses: ./.github/actions/setup
      - uses: ./.github/actions/wolfssl-checkout
      - name: make test (all self-test suites)
        run: make test
      - name: ML-DSA-65 CertificateVerify test (X509 + ML-DSA)
        run: make certmldsatest
      - name: X.509 negative auth test (chain + hostname + ECDSA CertificateVerify)
        run: make certnegtest
      - name: X.509 SPKI-pin-only tier (hostname compiled out)
        run: make certnegpintest
      - name: X.509 generated-PKI chain-constraint test (CA flag, keyUsage, EKU)
        run: make certgentest
      - name: X.509 clockless tier compiles (WOLFNANO_NO_X509_TIME)
        run: make cert-notime-build
      - name: configs-build (compile every starter template)
        run: make configs-build
