name: wiki-sync

on:
  push:
    branches: [main]
    paths:
      - docs/**
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wiki-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if git ls-remote "https://github.com/${{ github.repository }}.wiki.git" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Wiki not initialized; create its first page once in the GitHub UI, then docs/ will sync."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.check.outputs.exists == 'true'
        name: strip .md from intra-wiki links (wiki resolves bare page names)
        run: sed -i -E 's/\]\(([A-Za-z0-9_-]+)\.md\)/](\1)/g' docs/*.md
      - if: steps.check.outputs.exists == 'true'
        uses: Andrew-Chen-Wang/github-wiki-action@50650fccf3a10f741995523cf9708c53cec8912a
        with:
          path: docs/
