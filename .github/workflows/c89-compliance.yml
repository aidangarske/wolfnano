name: c89-compliance

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  c89:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/setup
      - name: shell compiles as C89 (-Werror)
        run: |
          set -eux
          for f in src/*.c; do
            cc -std=gnu89 -Wall -Wextra -Wdeclaration-after-statement -Werror -fsyntax-only \
              -DWOLFSSL_USER_SETTINGS -DWOLFNANO_TARGET_PORTABLE_C \
              -DWOLFNANO_X509 -DWOLFNANO_HAVE_RSA_VERIFY -DWOLFNANO_MLKEM \
              -DWOLFNANO_MLDSA -DWOLFNANO_ALLOW_MALLOC \
              -I. -Iwolfssl -Iinclude/wolfnano -Isrc "$f"
          done
