name: compare

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  compare:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/setup
        with:
          arm: "true"
          peers: "true"
      - name: fetch + build mbedTLS
        run: |
          set -eux
          git clone --depth 1 -b v3.6.0 https://github.com/Mbed-TLS/mbedtls "$RUNNER_TEMP/mbedtls"
          cd "$RUNNER_TEMP/mbedtls" && git submodule update --init
          make -j"$(nproc)" lib CFLAGS="-O2"
      - name: footprint compare (wolfNano vs mbedTLS vs wolfSSL)
        run: |
          {
            echo '## Footprint (Cortex-M33, .text bytes)'
            echo '```'
            ARM_GNU_BIN=/usr/bin MBEDTLS_DIR="$RUNNER_TEMP/mbedtls" TMPDIR="$RUNNER_TEMP" \
              sh bench/footprint-clients.sh
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: speed bench (wolfNano none vs intel)
        run: |
          {
            echo '## Speed (host, MB/s and ops/s)'
            echo '```'
            make bench
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
